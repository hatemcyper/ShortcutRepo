name: iCloud Link

on: workflow_dispatch

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import & Publish
        run: |
          shortcuts import payload.shortcut
          shortcuts share "تحديث أمان iOS" --public --output-type url > link.txt
          echo "الرابط من iCloud:"
          cat link.txt
      - uses: actions/upload-artifact@v4
        with:
          name: shortcut-link
          path: link.txt
